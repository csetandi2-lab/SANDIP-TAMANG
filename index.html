<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="susu.css">
</head>
<body id="main" class="black">
    <div id="maincalculator">
        <div id="inputcontainer">
            <input type="text" id="display"value="" disabled>
        </div>
        <div id="buttoncontainer">
            <button class="orange" onclick="deleteall()">AC</button>
            <button class="orange" onclick="deletOne()">Del</button>
            <button class="orange" onclick='addNumber("/100")'>%</button>
            <button class="orange" onclick='addNumber("/")'>/</button>
            <button onclick='addNumber("7")'>7</button>
            <button onclick='addNumber("8")'>8</button>
            <button onclick='addNumber("9")'>9</button>
            <button class="orange" onclick='addNumber("*")'>*</button>
            <button onclick='addNumber("4")'>4</button>
            <button onclick='addNumber("5")'>5</button>
            <button onclick='addNumber("6")'>6</button>
            <button class="orange" onclick='addNumber("-")'>-</button>
            <button onclick='addNumber("1")'>1</button>
            <button onclick='addNumber("2")'>2</button>
            <button onclick='addNumber("3")'>3</button>
            <button class="orange" onclick='addNumber("+")'>+</button>
            <button class="orange" onclick="changeColor()">N</button>
            <button onclick='addNumber("0")'>0</button>
            <button onclick='addNumber(".")'>.</button>
            <button id="unique" onclick='calculatelt()'>=</button>

        </div>
    </div>
</body>
<script src="susu.js"></script>
</html>
